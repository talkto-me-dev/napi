name: Publish @3-/captcha

on:
  push:
    branches:
      - main
    paths:
      - "captcha/**"
      - ".github/workflows/captcha-publish.yml"
      - ".github/workflows/napi-publish-template.yml"
  workflow_dispatch:

jobs:
  napi-publish:
    uses: ./.github/workflows/napi-publish-template.yml
    with:
      working-directory: "captcha"
