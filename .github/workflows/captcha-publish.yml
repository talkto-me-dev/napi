name: Publish @3-/captcha

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: "10.13"

on:
  push:
    branches:
      - main
    paths:
      - "captcha/**"
      - ".github/workflows/captcha-publish.yml"
  workflow_dispatch:

jobs:
  publish:
    uses: ./.github/workflows/napi-publish-template.yml
    with:
      working-directory: "captcha"
    secrets:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
