name: NAPI Publish Template

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: false


env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: "10.13"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: npm run build -- --target x86_64-apple-darwin
            skip_test: true
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npm run build -- --target aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build -- --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu --cross-compile
            skip_test: true
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: npm run build -- --target x86_64-unknown-linux-musl --cross-compile
            skip_test: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: npm run build -- --target aarch64-unknown-linux-musl --cross-compile
            skip_test: true
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build -- --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: npm run build -- --target aarch64-pc-windows-msvc
            skip_test: true

    name: stable - ${{ matrix.settings.target }} - node@20
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Install cargo-zigbuild
        if: ${{ startsWith(matrix.settings.target, 'x86_64-unknown-linux-musl') || startsWith(matrix.settings.target, 'aarch64-unknown-linux') }}
        run: pip3 install cargo-zigbuild

      - name: Install dependencies
        run: bun install
        working-directory: ${{ inputs.working-directory }}

      - name: Build
        run: ${{ matrix.settings.build }}
        working-directory: ${{ inputs.working-directory }}

      - name: Run Tests
        if: ${{ !matrix.settings.skip_test }}
        run: bun run test
        working-directory: ${{ inputs.working-directory }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ inputs.working-directory }}/*.node
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ inputs.working-directory }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ inputs.working-directory }}/artifacts
          merge-multiple: true

      - name: Move artifacts
        run: bun run artifacts
        working-directory: ${{ inputs.working-directory }}

      - name: Publish NPM Package
        run: |
          npm publish --provenance --access public
          for dir in npm/*; do
            if [ -d "$dir" ]; then
              echo "Publishing $dir..."
              npm publish "$dir" --provenance --access public
            fi
          done
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || vars.NPM_TOKEN }}
        working-directory: ${{ inputs.working-directory }}
