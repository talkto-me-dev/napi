name: NAPI Publish Template

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: false


env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: npm run build -- --target x86_64-apple-darwin --platform
            node_arch: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npm run build -- --target aarch64-apple-darwin --platform
            node_arch: arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build -- --target x86_64-unknown-linux-gnu --platform
            node_arch: x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu --platform
            node_arch: arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: npm run build -- --target x86_64-unknown-linux-musl --cross-compile --platform
            test_docker: oven/bun:alpine
            test_platform: linux/amd64
            node_arch: x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            build: npm run build -- --target aarch64-unknown-linux-musl --cross-compile --platform
            test_docker: oven/bun:alpine
            test_platform: linux/arm64
            node_arch: arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build -- --target x86_64-pc-windows-msvc --platform
            node_arch: x64
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
            build: npm run build -- --target aarch64-pc-windows-msvc --platform
            node_arch: arm64

    name: stable - ${{ matrix.settings.target }} - node@20
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          architecture: ${{ matrix.settings.node_arch }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Install Zig
        if: ${{ contains(matrix.settings.build, '--cross-compile') }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: ${{ contains(matrix.settings.build, '--cross-compile') }}
        run: pipx install cargo-zigbuild

      - name: Install dependencies
        run: bun install
        working-directory: ${{ inputs.working-directory }}

      - name: Build
        run: ${{ matrix.settings.build }}
        working-directory: ${{ inputs.working-directory }}
      - name: Run Tests (Native)
        if: ${{ !matrix.settings.test_docker }}
        shell: bash
        run: |
          cp *.node captcha.node
          npm run test
          rm -f captcha.node
        working-directory: ${{ inputs.working-directory }}

      - name: Run Tests (Docker)
        if: ${{ matrix.settings.test_docker }}
        run: |
          cp *.node captcha.node
          docker run --rm --platform ${{ matrix.settings.test_platform }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/${{ inputs.working-directory }} \
            ${{ matrix.settings.test_docker }} \
            sh -c "bun install && bun run test"
          rm -f captcha.node
        working-directory: ${{ inputs.working-directory }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ inputs.working-directory }}/*.node
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ inputs.working-directory }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ inputs.working-directory }}/artifacts
          merge-multiple: true

      - name: Move artifacts
        run: |
          bun run artifacts
          echo "Checking artifacts after move:"
          ls -R npm/
        working-directory: ${{ inputs.working-directory }}

      - name: Publish NPM Package
        run: |
          # prepublishOnly script in package.json handles --gh-release false
          npm publish --provenance --access public
          for dir in npm/*; do
            if [ -d "$dir" ]; then
              echo "Publishing $dir..."
              npm publish "./$dir" --provenance --access public
            fi
          done
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: ${{ inputs.working-directory }}
